databases:
  - name: jayna-db
    databaseName: jayna
    user: jayna
    plan: free

services:
  - type: web
    name: jayna-backend
    plan: free
    runtime: java
    buildCommand: "./mvnw package -DskipTests -Pprod"
    startCommand: "java -jar target/*.jar --spring.profiles.active=prod"
    healthCheckPath: /management/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: jayna-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: jayna-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: jayna-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET
        generateValue: true
      - key: STORAGE_LOCAL_PATH
        value: /tmp/jayna/documents

  - type: web
    name: jayna-frontend
    plan: free
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: target/classes/static
    envVars:
      - key: SERVER_API_URL
        fromService:
          name: jayna-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
