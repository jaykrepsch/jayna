databases:
  - name: jayna-db
    databaseName: jayna
    user: jayna
    plan: free

services:
  - type: web
    name: jayna-backend
    plan: starter
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /management/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: DB_HOST
        fromDatabase:
          name: jayna-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: jayna-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: jayna-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: jayna-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: jayna-db
          property: password
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET
        generateValue: true
      - key: STORAGE_LOCAL_PATH
        value: /tmp/jayna/documents
      - key: PORT
        value: 10000
      - key: JAVA_OPTS
        value: "-Xmx1g -Xms512m"

  - type: web
    name: jayna-frontend
    runtime: static
    buildCommand: "npm install && npm install webpack-merge webpack-cli webpack --save-dev && npm run build"
    staticPublishPath: target/classes/static
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: SERVER_API_URL
        fromService:
          name: jayna-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
