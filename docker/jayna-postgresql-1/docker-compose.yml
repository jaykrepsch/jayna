version: '3'
services:
  db:
    image: postgres:14.4
    container_name: jayna-postgresql-1
    environment:
      POSTGRES_USER: jayna
      POSTGRES_PASSWORD: geheim
      POSTGRES_DB: jayna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: 