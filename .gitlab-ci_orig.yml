#  artifacts:
#    reports:
#      junit: target/test-results/TESTS-results-jest.xml
#    paths:
#      - target/test-results
#      - target/jacoco
#    expire_in: 1 day

maven-package:
  stage: package
  script:
    - ./mvnw -ntp verify -Pprod -DskipTests -Dmaven.repo.local=$MAVEN_USER_HOME
  artifacts:
    paths:
      - target/*.jar
      - target/classes
    expire_in: 1 day

deploy:
  stage: deploy
  script:
    - scp target/jayna-$JAYNA_VERSION.jar $DEPLOY_USER@$DEPLOY_URL:$DEPLOY_FILE
run:
  stage: run
  script:
    - ssh $DEPLOY_USER@$DEPLOY_URL /var/jayna/start.sh
