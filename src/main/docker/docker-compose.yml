version: '3'
services:
  jayna-postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: jayna
      POSTGRES_PASSWORD: geheim
      POSTGRES_DB: jayna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jayna-file-server:
    image: nginx:alpine
    container_name: jayna-file-server
    ports:
      - "8081:80"
    volumes:
      - file_storage:/var/www/uploads
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    restart: unless-stopped

volumes:
  postgres_data:
  file_storage:
